<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blush &amp; Burgundy – Bras | Triumph</title>
<style>
/* ============================================================
   FONTS (local — Alliance No.1 Light + Regular)
   ============================================================ */
@font-face {
  font-family: "Alliance No1";
  src: url("./fonts/AllianceNo1-Light.otf") format("opentype");
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Alliance No1";
  src: url("./fonts/AllianceNo1-Regular.otf") format("opentype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

/* ============================================================
   DESIGN TOKENS (from Figma)
   ============================================================ */
:root {
  --c-bg:        #FFFFFF;
  --c-ink:       #000000;
  --c-ink-soft:  rgba(0,0,0,.5);
  --c-line:      #DADADA;
  --c-offwhite:  #F8F3F3;
  --c-burgundy:  #5E2039;

  --font-sans: "Alliance No1", "Inter", "Helvetica Neue", Arial, sans-serif;

  --pad-x: 24px;
  --header-h: 80px; /* measured on load (see JS) — sticky offset for the results bar */
  --row-gap: 112px; /* 80px + 40% */

  --ease-out: cubic-bezier(.22,.61,.36,1);
  --ease-reveal: cubic-bezier(.22,1,.36,1);
}

/* ============================================================
   RESET
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; overflow-x: clip; }
body {
  background: var(--c-bg);
  color: var(--c-ink);
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 14px;
  line-height: 1.45;
  letter-spacing: -0.02em;
  -webkit-font-smoothing: antialiased;
}
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; background: none; border: 0; padding: 0; color: inherit; }
a { color: inherit; text-decoration: none; }
ul { margin: 0; padding: 0; list-style: none; }
h1, h2, h3 { margin: 0; font-weight: 400; }

/* ============================================================
   HEADER (same as PDP prototype)
   ============================================================ */
header {
  position: sticky; top: 0; z-index: 50;
  background: var(--c-bg);
}
.nav {
  max-width: 1440px; margin: 0 auto;
  padding: 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.logo { display: inline-flex; align-items: center; flex: none; }
.logo__img { width: 156px; height: 20px; display: block; }
.nav__links { display: flex; gap: 24px; }
.nav__links a {
  font-size: 12px; letter-spacing: .04em; text-transform: uppercase;
  font-weight: 300;
  padding-bottom: 2px; border-bottom: 1px solid transparent;
  transition: border-color .25s var(--ease-out);
}
.nav__links a:hover { border-bottom-color: var(--c-ink); }
.nav__right { display: flex; align-items: center; gap: 20px; }
.search {
  display: flex; align-items: center; gap: 4px;
  height: 32px; padding: 0 16px 0 8px;
  background: #F1F1F1;
}
.search svg { width: 16px; height: 16px; fill: none; stroke: var(--c-ink); stroke-width: 1; flex: none; }
.search input {
  border: 0; outline: 0; background: transparent;
  font-family: inherit; font-size: 12px; letter-spacing: .04em; text-transform: uppercase;
  font-weight: 300;
  width: 64px; color: var(--c-ink);
}
.search input::placeholder { color: var(--c-ink); opacity: 1; }
.nav__icons { display: flex; align-items: center; gap: 20px; }
.nav__icons .icon { width: 18px; height: 18px; fill: none; stroke: var(--c-ink); stroke-width: 1.2; }
.nav__icons button[aria-label="Cart"] { display: inline-flex; align-items: flex-start; gap: 2px; }
.cart-count { font-size: 12px; font-weight: 300; letter-spacing: .04em; line-height: 1; }
.burger { display: none; }
.burger svg { width: 20px; height: 8px; fill: none; stroke: var(--c-ink); stroke-width: 1.2; display: block; }

/* ============================================================
   BREADCRUMB — HOME / BRAS / BLUSH & BURGUNDY
   ============================================================ */
.breadcrumb {
  max-width: 1440px; margin: 0 auto;
  display: flex; gap: 8px; align-items: center;
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  font-weight: 300;
  color: var(--c-ink);
  padding: 20px var(--pad-x) 24px;
}
.breadcrumb b { font-weight: 300; color: var(--c-ink-soft); }
.breadcrumb span { opacity: .4; }

/* ============================================================
   HERO — burgundy petal "List Interuptor" 1440x440
   ============================================================ */
.hero {
  position: relative;
  height: 500px;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.hero img, .hero video {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  animation: heroIn 1.6s var(--ease-out) both;
}
/* darker, red-shifted grade */
.hero video { filter: brightness(.72) saturate(1.35) sepia(.22) hue-rotate(-18deg) contrast(1.05); }
/* burgundy tint wash */
.hero::before {
  content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background: rgba(94,32,57,.25);
  mix-blend-mode: multiply;
}
/* film grain — retro noise */
.hero::after {
  content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity: .3;
  mix-blend-mode: overlay;
}
@keyframes heroIn {
  from { transform: scale(1.06); }
  to   { transform: scale(1); }
}
/* the title fades in once the video has played through */
.hero h1 {
  position: relative; z-index: 2;
  color: #fff;
  font-weight: 400;
  font-size: 20px;
  letter-spacing: .04em;
  text-transform: uppercase;
  text-align: center;
  opacity: 0; transform: translateY(10px);
  transition: opacity 1.2s var(--ease-out), transform 1.2s var(--ease-out);
}
.hero.is-ended h1 { opacity: 1; transform: translateY(0); }

/* ============================================================
   RESULTS ROW — title left, filters right (Figma 937-27214)
   three filter variants share the row; the version decides
   ============================================================ */
.results-bar { background: var(--c-bg); }
.results-row {
  max-width: 1440px; margin: 0 auto;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 10px;
  padding: 36px var(--pad-x);
}
.results-title {
  font-size: 12px; line-height: 24px; letter-spacing: .04em;
  text-transform: uppercase; font-weight: 400;
}
.results-title .count { font-size: 12px; font-weight: 300; color: var(--c-ink-soft); }
.results-title .nowrap { white-space: nowrap; }
.filters { display: none; gap: 20px; align-items: center; }
.filters button, .filters-single, .filters-mobile {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; line-height: 16px; letter-spacing: .04em;
  text-transform: uppercase; font-weight: 400;
  white-space: nowrap;
}
.filters button svg { width: 7px; height: 4px; fill: none; stroke: var(--c-ink); stroke-width: 1; flex: none; }
.filters button .plus, .filters-single svg, .filters-mobile svg { width: 10px; height: 10px; fill: none; stroke: var(--c-ink); stroke-width: 1; flex: none; }
.filters button:hover, .filters-single:hover, .filters-mobile:hover { opacity: .55; }
.filters-single { display: none; }
.filters-mobile { display: none; }

/* Filter V1 — the "More" chips reveal in place */
.filters__extra { display: contents; }
.filters__extra[hidden] { display: none; }

/* Filter V1 — chip dropdown (Figma 931-26774) */
.results-row { position: relative; }
.dropdown {
  position: absolute; z-index: 60;
  width: 240px;
  background: #fff;
  border: 1px solid var(--c-ink);
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  padding: 4px 0 8px;
  display: none;
}
.dropdown.is-open { display: block; }
.dropdown__row {
  display: flex; gap: 12px; align-items: center;
  width: 100%; padding: 10px 12px;
  font-size: 12px; line-height: 16px; letter-spacing: .04em;
  text-transform: uppercase; font-weight: 400; text-align: left;
  transition: background .15s;
}
.dropdown__row:hover, .dropdown__row[data-on="true"] { background: #F9FAFB; }
.dropdown__row .sw { width: 20px; height: 20px; flex: none; border: 1px solid rgba(0,0,0,.08); }
.dropdown__row .lbl { flex: 1; }
.dropdown__row .tick {
  width: 16px; height: 16px; flex: none;
  fill: none; stroke: var(--c-ink); stroke-width: 1.5;
  opacity: 0;
}
.dropdown__row[data-on="true"] .tick { opacity: 1; }
.dropdown__foot {
  display: flex; justify-content: space-between;
  border-top: 1px solid var(--c-line);
  margin: 4px 12px 0;
  padding: 14px 0 2px;
  font-size: 14px; line-height: 20px; letter-spacing: .04em; text-transform: uppercase;
}
.dropdown__foot button { font-size: 14px; line-height: 20px; letter-spacing: .04em; text-transform: uppercase; }
.dropdown__foot button:hover { opacity: .55; }

/* which filter row shows depends on the version */
body:not([data-version="fv1"]):not([data-version="fv2"]) .filters--full { display: flex; }
body[data-version="fv1"] .filters--reduced { display: flex; }
body[data-version="fv2"] .filters-single { display: inline-flex; }

/* ============================================================
   GRID — 4 flush columns; v4/v5 add 24px margins + gutters
   ============================================================ */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-flow: dense;
  row-gap: var(--row-gap);
  margin-bottom: 120px;
}
body:is([data-version="v4"], [data-version="v5"]) .grid {
  padding: 0 24px;
  column-gap: 24px;
}
/* V6 — V1 layout with 52px between the product cards (desktop only) */
body[data-version="v6"] .grid { column-gap: 52px; }
.card { cursor: pointer; } /* whole card opens the PDP (colour controls excepted) */
.card, .ed {
  position: relative;
  /* scroll reveal — blurred rise-and-fade, row by row */
  opacity: 0;
  transform: translateY(28px);
  filter: blur(3px);
  transition: opacity 1.4s var(--ease-reveal),
              transform 1.4s var(--ease-reveal),
              filter 1.4s var(--ease-reveal);
}
.card.is-visible, .ed.is-visible { opacity: 1; transform: none; filter: none; }
@media (prefers-reduced-motion: reduce) {
  .card, .ed { opacity: 1; transform: none; filter: none; transition: none; }
}

/* the 3 extra products only exist in V3 (its smaller editorials
   free up three grid slots) */
body:not([data-version="v3"]) .card--extra { display: none; }

.card__img {
  position: relative;
  aspect-ratio: 688 / 905; /* Figma card image */
  overflow: hidden;
  background: var(--c-offwhite);
}
.card__img .ph {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .9s var(--ease-out);
}
.card:hover .card__img .ph--base { transform: scale(1.04); }
/* variant overlay photo — crossfades on top of the base */
.card__img .ph--variant {
  opacity: 0;
  transition: opacity .38s var(--ease-out);
  background: #fff;
}
.card__img .ph--variant.is-on { opacity: 1; }

/* hover gallery — a different photo fades in, chevrons page through 4 */
.card__img .ph--hover {
  opacity: 0;
  transition: opacity .38s var(--ease-out);
  background: #fff;
}
.card__img .ph--hover.is-on { opacity: 1; }
.gal-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 4;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s var(--ease-out);
}
.gal-nav svg { width: 12px; height: 12px; fill: none; stroke: var(--c-ink); stroke-width: 1.2; transition: transform .2s var(--ease-out); }
.gal-nav:hover svg { transform: scale(1.25); }
.gal-nav--prev { left: 12px; }
.gal-nav--next { right: 12px; }
.card__img:hover .gal-nav { opacity: 1; pointer-events: auto; }
@media (hover: none) { .gal-nav { display: none; } }

/* wishlist heart — top right of every product photo */
.wish {
  position: absolute; top: 16px; right: 16px; z-index: 6;
  width: 24px; height: 24px;
}
.wish svg {
  width: 24px; height: 24px;
  fill: #fff; stroke: var(--c-ink); stroke-width: 1;
  transition: fill .2s var(--ease-out), transform .2s var(--ease-out);
}
.wish:hover svg { transform: scale(1.1); }
.wish[data-on="true"] svg { fill: var(--c-ink); }

/* ============================================================
   CARD INFO (Figma 937-27218) — title / price+RRP / "N colors"
   the colour count sits on the LEFT, below the price
   ============================================================ */
.card__info { position: relative; padding: 16px 12px 0; }
/* v4/v5 — info text sits flush with the image edge */
body:is([data-version="v4"], [data-version="v5"]) .card__info { padding-left: 0; padding-right: 0; }
body:is([data-version="v4"], [data-version="v5"]) .panel { padding-left: 0; }
.card__cat {
  font-size: 12px; line-height: 20px; letter-spacing: .04em;
  text-transform: uppercase; font-weight: 400;
}
.card__pr {
  display: flex; align-items: center; gap: 4px;
  margin-top: 4px; padding-top: 2px;
  font-size: 12px; line-height: 14px;
}
.card__pr .rrp { font-size: 10px; line-height: 12px; font-weight: 300; color: var(--c-ink-soft); }
.cvar__label {
  display: block;
  margin-top: 7px; /* mobile overrides back to 4px below */
  font-size: 12px; line-height: 14px; font-weight: 400;
  transition: opacity .2s var(--ease-out);
}
.cvar__label:hover { opacity: .55; }

/* ============================================================
   EXPANDING COLOUR PANEL — covers the info area on open
   swatches from /Colour Swatches (black · red · mauve lace)
   ============================================================ */
.panel {
  position: absolute; inset: 0;
  z-index: 5;
  display: flex; gap: 6px; align-items: center;
  padding: 12px 64px 12px 12px;
  background: #fff;
  opacity: 0; pointer-events: none;
  transform: translateY(6px);
  transition: opacity .32s var(--ease-out), transform .32s var(--ease-out);
}
.card.is-open .panel { opacity: 1; pointer-events: auto; transform: translateY(0); }
.thumb {
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
  transition: border-color .2s var(--ease-out);
  flex: none;
}
.thumb img { width: 44px; height: 44px; object-fit: cover; background: #fff; border: 1px solid rgba(0,0,0,.06); }
.thumb:hover { border-bottom-color: var(--c-line); }
.thumb[data-sel="true"] { border-bottom-color: var(--c-ink); }
/* the currently worn colour — product photo cropped to the bra */
.thumb--current img { object-position: 50% 22%; }
.panel__close {
  position: absolute; top: 50%; transform: translateY(-50%); right: 12px;
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  font-weight: 300;
  padding-bottom: 1px;
  border-bottom: 1px solid var(--c-ink);
  transition: opacity .2s;
}
.panel__close:hover { opacity: .5; }

/* ============================================================
   EDITORIAL INTERRUPTORS — car (row 2 + last row) and lips (tall)
   base: full-bleed; versions add insets (see below)
   ============================================================ */
.ed { overflow: hidden; }
.ed img { width: 100%; height: 100%; object-fit: cover; }
.ed--row2, .ed--last, .ed--tall { grid-column: span 2; align-self: start; }
.ed--row2 img { object-position: 50% 55%; transform: scale(1.15); } /* peony bouquet — zoomed in slightly */
.ed--last img { object-position: 50% 50%; } /* hydrangea face close-up */
.ed--tall img { object-position: 50% 52%; } /* love letter on the velvet sofa */

/* V2 — editorials inset 24px inside their slots (Figma 931-16566) */
body[data-version="v2"] .ed { padding: 0 24px; }
/* V3 — small floating editorials with generous white space (931-16973) */
body[data-version="v3"] .ed {
  grid-column: span 1;
  padding: 0 60px;
}
/* V5 — guttered grid + editorials inset another 40px (931-18585) */
body[data-version="v5"] .ed { padding: 0 40px; }

/* ============================================================
   OFF-CANVAS FILTER & SORT — Filter V2 (Figma 931-25755)
   420px right drawer · dim scrim · accordions · Show results
   ============================================================ */
.scrim {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,.4);
  opacity: 0; pointer-events: none;
  transition: opacity .35s var(--ease-out);
}
body.drawer-open .scrim { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 95;
  width: 420px; max-width: 92vw;
  background: #fff;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  visibility: hidden; /* fully out of the layout when closed — keeps mobile from widening */
  transition: transform .45s var(--ease-out), visibility 0s .45s;
}
body.drawer-open .drawer {
  transform: translateX(0);
  visibility: visible;
  transition: transform .45s var(--ease-out);
}
.drawer__head {
  flex: none;
  height: 72px; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--c-line);
}
.drawer__head span { font-size: 14px; line-height: 20px; letter-spacing: .02em; }
.drawer__close { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.drawer__close svg { width: 14px; height: 14px; fill: none; stroke: var(--c-ink); stroke-width: 1.2; }
.drawer__close:hover { opacity: .5; }
.drawer__body { flex: 1; overflow-y: auto; padding: 24px; }
.facet { border-bottom: 1px solid var(--c-line); margin-bottom: 16px; }
.facet__head {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 16px;
  font-size: 12px; line-height: 16px; letter-spacing: .04em;
  text-transform: uppercase; font-weight: 400;
  text-align: left;
}
.facet__head svg {
  width: 10px; height: 6px; fill: none; stroke: var(--c-ink); stroke-width: 1; flex: none;
  transition: transform .3s var(--ease-out);
}
.facet.is-open .facet__head svg { transform: rotate(180deg); }
.facet__body {
  max-height: 0; overflow: hidden;
  transition: max-height .4s var(--ease-out);
}
.facet.is-open .facet__body { max-height: 320px; }
.facet__body ul { padding-bottom: 16px; }
.facet__body li button {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 0;
  font-size: 12px; line-height: 16px; font-weight: 300; letter-spacing: .02em;
}
.facet__body li button:hover { opacity: .55; }
.facet__body li button[data-on="true"] { font-weight: 400; }
.facet__body li button[data-on="true"]::after { content: "✓"; font-size: 10px; }
.facet__body img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
/* size chips */
.facet__sizes { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 16px; }
.facet__sizes button {
  min-width: 44px; height: 32px; padding: 0 10px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--c-line);
  font-size: 12px; font-weight: 300;
  transition: border-color .2s, background .2s;
}
.facet__sizes button:hover { border-color: var(--c-ink); }
.facet__sizes button[data-on="true"] { background: var(--c-ink); color: #fff; border-color: var(--c-ink); }
.drawer__foot { flex: none; padding: 24px; display: flex; gap: 12px; }
/* secondary — only shows once at least one filter is set */
.drawer__clear {
  flex: 1; height: 44px;
  background: #fff; color: var(--c-ink);
  border: 1px solid var(--c-ink);
  font-size: 13px; letter-spacing: .06em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .2s;
}
.drawer__clear:hover { opacity: .55; }
.drawer__clear[hidden] { display: none; }
.drawer__cta {
  flex: 1; height: 44px;
  background: var(--c-ink); color: #fff;
  font-size: 13px; letter-spacing: .06em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .2s;
}
.drawer__cta:hover { opacity: .85; }

/* ============================================================
   RESPONSIVE — tablet step + mobile designs (931-14018 etc.)
   ============================================================ */
@media (max-width: 1100px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 760px) {
  :root { --row-gap: 56px; } /* 40px + 40% */

  /* header — 50px bar: logo · suche · account · bag · burger */
  .nav { padding: 12px 16px; gap: 16px; }
  .logo__img { width: 100px; height: 13px; }
  .nav__links { display: none; }
  .nav__right { gap: 16px; }
  .nav__icons { gap: 16px; }
  .nav__icons .icon { width: 16px; height: 16px; }
  .nav__icons button[aria-label="Wishlist"] { display: none; }
  .burger { display: inline-flex; }
  .search { height: 26px; padding: 0 12px 0 8px; }
  .search svg { width: 14px; height: 14px; }
  .search input { width: 60px; }

  .breadcrumb { font-size: 10px; letter-spacing: .04em; padding: 12px 16px; gap: 8px; }

  /* hero — banner title at half size */
  .hero { height: 300px; }
  .hero h1 { font-size: 10px; }

  /* results bar — title left (wraps under itself), "Sort & Filter +" right,
     both aligned along the bottom edge */
  .results-row { padding: 20px 16px 16px; }
  .results-title { flex: 1; font-size: 12px; line-height: 16px; }
  .results-title .count { font-size: 10px; }
  .filters-mobile { line-height: 16px; }
  .filters, .filters-single { display: none !important; }
  .filters-mobile { display: inline-flex; }

  /* grid — 2 columns */
  .grid { grid-template-columns: repeat(2, 1fr) !important; margin-bottom: 80px; }
  body[data-version="v6"] .grid { column-gap: 0; } /* the 52px gap is desktop-only */
  body:is([data-version="v4"], [data-version="v5"]) .grid { padding: 0 16px; column-gap: 16px; }

  /* card info */
  .card__info { padding: 10px 4px 0; }
  body:is([data-version="v4"], [data-version="v5"]) .card__info { padding-left: 0; padding-right: 0; }

  /* hearts sit closer to the corner on small cards */

  /* colour panel — fit the narrow cards */
  .panel { flex-wrap: wrap; gap: 4px; padding: 8px 48px 8px 4px; overflow: hidden; }
  .thumb img { width: 32px; height: 32px; }
  .panel__close { right: 8px; }

  /* gallery — swipe only, no chevrons */
  .gal-nav { display: none; }

  /* editorials — full row on mobile (Figma 931-14018 / 931-19249);
     no zoom on the first tile, so its padding matches the others */
  .ed--row2 img { transform: none; }
  .ed--row2, .ed--tall, .ed--last {
    grid-column: 1 / -1 !important; grid-row: auto;
    height: auto !important;
    aspect-ratio: 375 / 247;
  }
  body[data-version="v2"] .ed { padding: 0 24px; }
  body:is([data-version="v3"], [data-version="v5"]) .ed { padding: 0 40px !important; }

  /* drawer */
  .drawer { width: 100%; max-width: 100vw; }
  .drawer__head, .drawer__body, .drawer__foot { padding-left: 20px; padding-right: 20px; }
  .drawer__body { padding-top: 24px; }
  .drawer__foot { padding-top: 0; padding-bottom: 24px; }

  /* prototype chrome — filter versions are desktop-only */
  .switcher { max-width: calc(100vw - 24px); overflow-x: auto; }
  .switcher button { padding: 6px 10px; font-size: 11px; }
  .switcher button[data-v="fv1"], .switcher button[data-v="fv2"] { display: none; }
}

<script>
/* ============================================================
   DATA — products from Figma 937-27178 (Blush & Burgundy),
   colour swatches from /Colour Swatches (black · red · mauve)
   ============================================================ */
const SWATCHES = [
  { name: 'Black Lace', sw: './Assets/plp/swatch-black.jpg', photo: './Assets/plp/card4.jpg' },
  { name: 'Deep Red',   sw: './Assets/plp/swatch-red.jpg',   photo: './Assets/plp/card5.jpg' },
  { name: 'Mauve',      sw: './Assets/plp/swatch-mauve.jpg', photo: './Assets/plp/card3.jpg' },
];

const P = n => `./Assets/plp/card${n}.jpg`;
const PRODUCTS = [
  { cat: 'LACE BALCONETTE BRA',       pr: '£59.95', colors: 4, ph: P(6) },
  { cat: 'PADDED UNDERWIRE BRA',      pr: '£50.95', colors: 4, ph: P(2) },
  { cat: 'SEAMLESS T-SHIRT BRA',      pr: '£38.50', colors: 3, ph: P(3) },
  { cat: 'PLUNGE LACE BRA',           pr: '£59.95', colors: 4, ph: P(5) },
  { cat: 'WIRELESS COMFORT BRA',      pr: '£29.95', colors: 3, ph: P(1) },
  /* dark red — sits right of the peony interruptor */
  { cat: 'STRAPLESS PUSH-UP BRA',     pr: '£52.00', colors: 4, ph: P(4) },
  { cat: 'DEMI CUP SATIN BRA',        pr: '£55.00', colors: 3, ph: P(3) },
  { cat: 'SPORTS PERFORMANCE BRA',    pr: '£34.95', colors: 4, ph: P(2) },
  { cat: 'FULL COVERAGE BRA',         pr: '£32.00', colors: 3, ph: P(6) },
  { cat: 'BRALETTE TRIANGLE',         pr: '£24.95', colors: 4, ph: P(5) },
  /* two bright pink bras — sit left of the tulle interruptor */
  { cat: 'HALTER NECK BRA',           pr: '£42.50', colors: 4, ph: P(1) },
  { cat: 'EMBROIDERED UNDERWIRE BRA', pr: '£58.00', colors: 3, ph: P(3) },
  { cat: 'CONVERTIBLE MULTI-WAY BRA', pr: '£47.00', colors: 4, ph: P(2) },
  { cat: 'LONGLINE LACE BRA',         pr: '£62.00', colors: 3, ph: P(3) },
  { cat: 'MINIMIZER BRA',             pr: '£39.95', colors: 4, ph: P(6) },
  { cat: 'NURSING SUPPORT BRA',       pr: '£36.00', colors: 3, ph: P(1) },
  { cat: 'RACERBACK SPORTS BRA',      pr: '£28.50', colors: 4, ph: P(5) },
  { cat: 'PADDED UNDERWIRE BRA',      pr: '£59.95', colors: 3, ph: P(4) },
  { cat: 'SOFT LACE BRALETTE',        pr: '£27.95', colors: 4, ph: P(2) },
  { cat: 'UNWIRED SPACER BRA',        pr: '£44.95', colors: 3, ph: P(6) },
  { cat: 'HIGH APEX LACE BRA',        pr: '£49.95', colors: 4, ph: P(1) },
  { cat: 'SATIN TRIM BRA',            pr: '£41.00', colors: 3, ph: P(3) },
  /* V3 only — its smaller editorials leave room for 3 more cards */
  { cat: 'BALCONETTE MESH BRA',       pr: '£46.50', colors: 4, ph: P(5), extra: true },
  { cat: 'TRIANGLE SATIN BRA',        pr: '£33.95', colors: 3, ph: P(4), extra: true },
  { cat: 'LIGHTLY PADDED BRA',        pr: '£37.50', colors: 4, ph: P(2), extra: true },
];

/* editorial interruptor slots per version:
   row2/last = car photo · tall = lips photo (spans 2 rows)
   numbers = card index the tile is inserted before */
const LAYOUTS = {
  v1:  { row2: 5, tall: 12, last: 20 },
  v2:  { row2: 6, tall: 12, last: 20 },
  v3:  { row2: 6, tall: 11, last: 23 }, /* lips sit LEFT, small tiles take 1 column */
  v4:  { row2: 5, tall: 12, last: 20 },
  v5:  { row2: 5, tall: 12, last: 20 },
  v6:  { row2: 5, tall: 12, last: 20 }, /* V1 layout + 52px card gaps on desktop */
  fv1: { row2: 5, tall: 12, last: 20 },
  fv2: { row2: 5, tall: 12, last: 20 },
};

/* ============================================================
   RENDER CARDS
   ============================================================ */
const grid = document.getElementById('grid');

/* alternate product photos for the hover gallery (4 per card) */
const GALLERY_POOL = [P(1), P(2), P(3), P(4), P(5), P(6)];

PRODUCTS.forEach((p, i) => {
  /* 4 hover photos: the card's own + 3 rotating alternates */
  const others = GALLERY_POOL.filter(src => src !== p.ph);
  const gallery = [p.ph, others[i % others.length], others[(i + 2) % others.length], others[(i + 4) % others.length]];

  const card = document.createElement('article');
  card.className = 'card' + (p.extra ? ' card--extra' : '');
  card.dataset.gallery = gallery.join('|');

  /* panel thumbs: the worn colour (product photo crop) + fabric swatches */
  const swatchThumbs = SWATCHES.slice(0, p.colors - 1).map((s, j) => `
    <button class="thumb" data-photo="${s.photo}" data-idx="${j + 1}" data-sel="false" aria-label="${s.name}" title="${s.name}">
      <img src="${s.sw}" alt="${s.name}" loading="lazy" />
    </button>`).join('');

  card.innerHTML = `
    <div class="card__img">
      <img class="ph ph--base" src="${p.ph}" alt="${p.cat}" />
      <img class="ph ph--variant" src="${p.ph}" alt="" aria-hidden="true" />
      <img class="ph ph--hover" src="${gallery[1]}" alt="" aria-hidden="true" />
      <button class="gal-nav gal-nav--prev" aria-label="Previous photo"><svg viewBox="0 0 10 10"><path d="M6.5 1 2.5 5l4 4"/></svg></button>
      <button class="gal-nav gal-nav--next" aria-label="Next photo"><svg viewBox="0 0 10 10"><path d="M3.5 1l4 4-4 4"/></svg></button>
      <button class="wish" data-on="false" aria-label="Add to wishlist"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" stroke-linejoin="round"/></svg></button>
    </div>
    <div class="card__info">
      <div class="card__cat">${p.cat}</div>
      <div class="card__pr">${p.pr}<span class="rrp">RRP</span></div>
      <button class="cvar__label">${p.colors} colors</button>
      <div class="panel" role="group" aria-label="Colours">
        <button class="thumb thumb--current" data-photo="${p.ph}" data-idx="0" data-sel="true" aria-label="Selected colour" title="Selected colour">
          <img src="${p.ph}" alt="" loading="lazy" />
        </button>
        ${swatchThumbs}
        <button class="panel__close">Close</button>
      </div>
    </div>`;

  grid.appendChild(card);
});

/* ============================================================
   EDITORIAL INTERRUPTORS — created once, re-slotted per version
   ============================================================ */
const mkTile = (cls, src) => {
  const t = document.createElement('div');
  t.className = 'ed ' + cls;
  t.innerHTML = `<img src="${src}" alt="" loading="lazy" />`;
  return t;
};
const edRow2 = mkTile('ed--row2', './Assets/plp/ed-peonies-wide.jpg');
const edTall = mkTile('ed--tall', './Assets/plp/ed-loveletter.jpg');
const edLast = mkTile('ed--last', './Assets/plp/ed-hydrangea.jpg');

const cards = []; /* filled below, before the first placeTiles() */

function placeTiles(v) {
  const cfg = LAYOUTS[v] || LAYOUTS.v1;
  grid.insertBefore(edRow2, cards[cfg.row2] || null);
  grid.insertBefore(edTall, cards[cfg.tall] || null);
  grid.insertBefore(edLast, cards[cfg.last] || null);
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
const body = document.body;
cards.push(...document.querySelectorAll('.card'));
placeTiles('v1');

/* hero video plays once and freezes on its last frame;
   the title fades in a second after playback starts */
const hero = document.querySelector('.hero');
const heroVideo = hero.querySelector('video');
const showHeroTitle = () => hero.classList.add('is-ended');
heroVideo.addEventListener('playing', () => setTimeout(showHeroTitle, 1000), { once: true });
heroVideo.addEventListener('error', showHeroTitle);
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) showHeroTitle();

/* keep the sticky results bar flush below the nav, whatever its real height */
const setHeaderH = () =>
  document.documentElement.style.setProperty('--header-h', document.querySelector('header').offsetHeight + 'px');
setHeaderH();
window.addEventListener('resize', setHeaderH);

/* editorial tiles are trimmed so their images end level with the
   neighbouring photos (row2/last) or the second photo row (tall) */
function alignTiles() {
  const mobile = window.innerWidth <= 760;
  if (mobile) { [edRow2, edTall, edLast].forEach(t => t.style.height = ''); return; }
  const ref = cards.find(c => c.offsetParent) || cards[0];
  const photoH = ref.querySelector('.card__img').offsetHeight;
  [edRow2, edTall, edLast].forEach(t => t.style.height = photoH + 'px');
}
window.addEventListener('resize', alignTiles);
window.addEventListener('load', alignTiles);

/* ============================================================
   SCROLL REVEAL — one-shot blurred rise per row
   (delay follows the RENDERED column, so rows sweep left → right
   even when editorial tiles span columns)
   ============================================================ */
function setRevealDelays() {
  const gRect = grid.getBoundingClientRect();
  const nCols = getComputedStyle(grid).gridTemplateColumns.split(' ').length;
  [...grid.children].forEach(c => {
    const col = Math.round((c.getBoundingClientRect().left - gRect.left) / (gRect.width / nCols));
    c.style.transitionDelay = Math.max(0, col) * 120 + 'ms';
  });
}
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  [...grid.children].forEach(c => c.classList.add('is-visible'));
} else {
  const io = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (!en.isIntersecting) return;
      en.target.classList.add('is-visible');
      io.unobserve(en.target);
    });
  }, { threshold: .2, rootMargin: '0px 0px -10% 0px' });
  setRevealDelays();
  window.addEventListener('resize', setRevealDelays);
  [...grid.children].forEach(c => io.observe(c));
}

function closeAll(except) {
  cards.forEach(c => { if (c !== except) c.classList.remove('is-open'); });
}

function swapImage(card, src) {
  const overlay = card.querySelector('.ph--variant');
  if (!src) { overlay.classList.remove('is-on'); return; }
  overlay.src = src;
  if (overlay.complete) overlay.classList.add('is-on');
  else overlay.onload = () => overlay.classList.add('is-on');
}

cards.forEach(card => {
  /* clicking the product (photo or title) opens the PDP;
     colour label / panel / gallery / heart keep their own behaviour */
  card.addEventListener('click', e => {
    if (e.target.closest('.thumb, .cvar__label, .panel, .gal-nav, .wish')) return;
    window.location.href = './pdp.html';
  });

  /* hover gallery — entering the photo shows a different shot,
     chevrons page through all 4; leaving restores the base photo */
  const gallery = card.dataset.gallery.split('|');
  const hoverImg = card.querySelector('.ph--hover');
  const imgWrap = card.querySelector('.card__img');
  let galIdx = 0;
  function showGal(i) {
    galIdx = (i + gallery.length) % gallery.length;
    if (galIdx === 0) { hoverImg.classList.remove('is-on'); return; }
    hoverImg.src = gallery[galIdx];
    if (hoverImg.complete) hoverImg.classList.add('is-on');
    else hoverImg.onload = () => hoverImg.classList.add('is-on');
  }
  card._resetGallery = () => showGal(0);
  /* hover gallery is pointer-only — a tap on touch devices must not swap the photo */
  const isTouch = window.matchMedia('(hover: none)').matches;
  if (!isTouch) {
    imgWrap.addEventListener('mouseenter', () => showGal(1));
    imgWrap.addEventListener('mouseleave', () => showGal(0));
  }
  card.querySelector('.gal-nav--prev').addEventListener('click', e => { e.stopPropagation(); showGal(galIdx - 1); });
  card.querySelector('.gal-nav--next').addEventListener('click', e => { e.stopPropagation(); showGal(galIdx + 1); });

  /* touch — swipe left/right pages through the gallery */
  let tX = 0, tY = 0;
  imgWrap.addEventListener('touchstart', e => {
    tX = e.touches[0].clientX; tY = e.touches[0].clientY;
  }, { passive: true });
  imgWrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tX;
    const dy = e.changedTouches[0].clientY - tY;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) showGal(galIdx + (dx < 0 ? 1 : -1));
  }, { passive: true });

  /* wishlist heart */
  const wish = card.querySelector('.wish');
  wish.addEventListener('click', e => {
    e.stopPropagation();
    wish.dataset.on = wish.dataset.on === 'true' ? 'false' : 'true';
  });

  /* "N colors" — expanding panel over the info area */
  card.querySelector('.cvar__label').addEventListener('click', e => {
    e.stopPropagation();
    const open = card.classList.contains('is-open');
    closeAll(card);
    card.classList.toggle('is-open', !open);
  });
  card.querySelector('.panel__close').addEventListener('click', e => {
    e.stopPropagation();
    card.classList.remove('is-open');
  });

  /* swatch thumbnails — click selects + swaps the photo */
  card.querySelectorAll('.thumb').forEach(th => {
    th.addEventListener('click', e => {
      e.stopPropagation();
      card.querySelectorAll('.thumb').forEach(t => t.dataset.sel = String(t === th));
      /* the current-colour thumb restores the card's own photo */
      swapImage(card, th.dataset.idx === '0' ? null : th.dataset.photo);
    });
  });
});

/* click outside closes open panels */
document.addEventListener('click', e => {
  if (!e.target.closest('.card')) closeAll();
});

/* ============================================================
   OFF-CANVAS FILTER & SORT (Filter V2)
   ============================================================ */
const FACETS = [
  { label: 'Sort by',  type: 'list',   items: ['Newest', 'Price (low – high)', 'Price (high – low)', 'Bestsellers'], on: 0 },
  { label: 'Size',     type: 'sizes',  items: ['70A', '70B', '75A', '75B', '75C', '80B', '80C', '85B'] },
  { label: 'Colour',   type: 'colors', items: SWATCHES },
  { label: 'Fabrics',  type: 'list',   items: ['Lace', 'Satin', 'Mesh', 'Cotton'] },
  { label: 'Price',    type: 'list',   items: ['Under £30', '£30 – £50', 'Over £50'] },
  { label: 'Series',   type: 'list',   items: ['Love in Lace', 'Aura Spotlight', 'Signature Sheer', 'Body Make-Up'] },
  { label: 'Product standards & traceability', type: 'list', items: ['OEKO-TEX Standard 100', 'Recycled materials', 'Organic cotton'] },
];

const facetsEl = document.getElementById('facets');
FACETS.forEach(f => {
  const facet = document.createElement('div');
  facet.className = 'facet';
  let bodyHtml = '';
  if (f.type === 'sizes') {
    bodyHtml = `<div class="facet__sizes">${f.items.map(s => `<button data-on="false">${s}</button>`).join('')}</div>`;
  } else if (f.type === 'colors') {
    bodyHtml = `<ul>${f.items.map(s => `<li><button data-on="false"><img src="${s.sw}" alt="" />${s.name}</button></li>`).join('')}</ul>`;
  } else {
    bodyHtml = `<ul>${f.items.map((s, j) => `<li><button data-on="${j === f.on}">${s}</button></li>`).join('')}</ul>`;
  }
  facet.innerHTML = `
    <button class="facet__head">${f.label}
      <svg viewBox="0 0 10 6"><path d="M.5.5 5 5 9.5.5"/></svg>
    </button>
    <div class="facet__body">${bodyHtml}</div>`;
  facet.querySelector('.facet__head').addEventListener('click', () => facet.classList.toggle('is-open'));
  /* toggle options (radio for sort, checkbox elsewhere) */
  facet.querySelectorAll('.facet__body button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (f.label === 'Sort by') facet.querySelectorAll('.facet__body button').forEach(b => b.dataset.on = 'false');
      btn.dataset.on = btn.dataset.on === 'true' ? 'false' : 'true';
    });
  });
  facetsEl.appendChild(facet);
});

/* "Reset filters" appears once at least one filter is set (sort default doesn't count) */
const clearBtn = document.querySelector('.drawer__clear');
const filterFacets = [...facetsEl.querySelectorAll('.facet')].slice(1); /* skip "Sort by" */
function updateClear() {
  clearBtn.hidden = !filterFacets.some(f => f.querySelector('.facet__body button[data-on="true"]'));
}
facetsEl.addEventListener('click', updateClear);
clearBtn.addEventListener('click', () => {
  filterFacets.forEach(f => f.querySelectorAll('.facet__body button').forEach(b => b.dataset.on = 'false'));
  updateClear();
});

const drawer = document.querySelector('.drawer');
function setDrawer(open) {
  body.classList.toggle('drawer-open', open);
  drawer.setAttribute('aria-hidden', String(!open));
}
document.getElementById('drawerTrigger').addEventListener('click', () => setDrawer(true));
document.querySelector('.drawer__close').addEventListener('click', () => setDrawer(false));
document.querySelector('.drawer__cta').addEventListener('click', () => setDrawer(false));
document.getElementById('scrim').addEventListener('click', () => setDrawer(false));
document.addEventListener('keydown', e => { if (e.key === 'Escape') setDrawer(false); });

/* ============================================================
   FILTER V1 — chip dropdowns (Figma 931-26774) + More/Less
   ============================================================ */
const DD_ITEMS = {
  size: ['70A', '70B', '75A', '75B', '75C', '80B', '80C', '85B'],
  colour: [
    { name: 'Red',   c: '#C1003F' }, { name: 'Blue',  c: '#3B82F6' },
    { name: 'Green', c: '#10B981' }, { name: 'Black', c: '#000000' },
    { name: 'White', c: '#FFFFFF' }, { name: 'Pink',  c: '#EC4899' },
    { name: 'Grey',  c: '#6B7280' },
  ],
  series: ['Love in Lace', 'Aura Spotlight', 'Signature Sheer', 'Body Make-Up'],
  fabric: ['Lace', 'Satin', 'Mesh', 'Cotton'],
  standards: ['OEKO-TEX Standard 100', 'Recycled materials', 'Organic cotton'],
  sort: ['Newest', 'Price (low – high)', 'Price (high – low)', 'Bestsellers'],
};
const ddState = { sort: new Set([0]) }; /* per facet: selected indices */

const resultsRow = document.querySelector('.results-row');
const dropdown = document.createElement('div');
dropdown.className = 'dropdown';
resultsRow.appendChild(dropdown);
let ddChip = null;

function openDropdown(chip) {
  const key = chip.dataset.f;
  const items = DD_ITEMS[key];
  const sel = ddState[key] || (ddState[key] = new Set());

  dropdown.innerHTML = items.map((it, i) => {
    const name = typeof it === 'string' ? it : it.name;
    const sw = typeof it === 'string' ? '' : `<span class="sw" style="background:${it.c}"></span>`;
    return `<button class="dropdown__row" data-i="${i}" data-on="${sel.has(i)}">${sw}<span class="lbl">${name}</span>
      <svg class="tick" viewBox="0 0 16 16"><path d="M2.5 8.5 6.5 12.5 13.5 4"/></svg></button>`;
  }).join('') + `
    <div class="dropdown__foot"><button class="dd-reset">Reset</button><button class="dd-save">Save</button></div>`;

  /* sits below the clicked chip, kept inside the row */
  const rowRect = resultsRow.getBoundingClientRect();
  const r = chip.getBoundingClientRect();
  dropdown.style.left = Math.min(r.left - rowRect.left, resultsRow.clientWidth - 240 - 24) + 'px';
  dropdown.style.top = (r.bottom - rowRect.top + 8) + 'px';
  dropdown.classList.add('is-open');
  ddChip = chip;

  dropdown.querySelectorAll('.dropdown__row').forEach(rowBtn => {
    rowBtn.addEventListener('click', () => {
      const i = +rowBtn.dataset.i;
      if (key === 'sort') { /* single choice */
        sel.clear(); sel.add(i);
        dropdown.querySelectorAll('.dropdown__row').forEach(b => b.dataset.on = 'false');
        rowBtn.dataset.on = 'true';
        return;
      }
      sel.has(i) ? sel.delete(i) : sel.add(i);
      rowBtn.dataset.on = String(sel.has(i));
    });
  });
  dropdown.querySelector('.dd-reset').addEventListener('click', () => {
    sel.clear();
    dropdown.querySelectorAll('.dropdown__row').forEach(b => b.dataset.on = 'false');
  });
  dropdown.querySelector('.dd-save').addEventListener('click', closeDropdown);
}
function closeDropdown() {
  dropdown.classList.remove('is-open');
  ddChip = null;
}
document.querySelectorAll('.filters--reduced [data-f]').forEach(chip => {
  chip.addEventListener('click', e => {
    e.stopPropagation();
    if (ddChip === chip) { closeDropdown(); return; }
    openDropdown(chip);
  });
});
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown, .filters--reduced')) closeDropdown();
});

/* More reveals the remaining chips, then reads Less */
const moreToggle = document.querySelector('.more-toggle');
const extraChips = document.querySelector('.filters__extra');
moreToggle.addEventListener('click', () => {
  const show = extraChips.hidden;
  extraChips.hidden = !show;
  moreToggle.innerHTML = show
    ? 'Less <svg class="plus" viewBox="0 0 10 10"><path d="M0 5h10"/></svg>'
    : 'More <svg class="plus" viewBox="0 0 10 10"><path d="M5 0v10M0 5h10"/></svg>';
  closeDropdown();
});

/* ============================================================
   VERSION SWITCHER — V1-V5 + the two desktop filter directions
   ============================================================ */
const switcher = document.querySelector('.switcher');

function setVersion(v) {
  if (!LAYOUTS[v]) v = 'v1';
  body.dataset.version = v;
  closeAll();
  setDrawer(false);
  closeDropdown();
  placeTiles(v);
  /* reset all variant selections + previews (back to the worn colour) */
  cards.forEach(card => {
    card.querySelector('.ph--variant').classList.remove('is-on');
    card._resetGallery();
    card.querySelectorAll('.thumb').forEach(t => t.dataset.sel = String(t.dataset.idx === '0'));
  });
  switcher.querySelectorAll('button').forEach(b => b.dataset.on = (b.dataset.v === v));
  alignTiles();
  setRevealDelays();
}

switcher.addEventListener('click', e => {
  const btn = e.target.closest('button[data-v]');
  if (btn) setVersion(btn.dataset.v);
});

/* deep-link: plp.html?v=v3&open=2 (open forces the nth card open — for review/screenshots) */
const params = new URLSearchParams(location.search);
if (params.get('v')) setVersion(params.get('v'));
else alignTiles();
if (params.get('drawer')) setDrawer(true);
if (params.get('dd')) {
  const chip = document.querySelector(`.filters--reduced [data-f="${params.get('dd')}"]`);
  if (chip) requestAnimationFrame(() => openDropdown(chip));
}
if (params.get('open')) {
  const n = Math.max(1, parseInt(params.get('open'), 10) || 1) - 1;
  requestAnimationFrame(() => (cards[n] || cards[0]).classList.add('is-open'));
}
</script>

</body>
</html>
